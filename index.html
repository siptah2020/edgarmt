  const getNum = (member) => member.name === "Edgar" && playerConfig?.jerseyNum ? playerConfig.jerseyNum : member.defaultNum;

  const buildTeam = () => {
    const roleMap = { "gk": "Målmand", "lb": "Forsvar", "rb": "Forsvar", "lm": "Midtbane", "rm": "Midtbane", "ls": "Angriber", "rs": "Angriber" };
    const team = FORMATION_SLOTS.map(slot => {
      const name = assignments[slot.id];
      const member = FAMILY_MEMBERS.find(f => f.name === name);
      return {
        name: member.name, role: roleMap[slot.id], num: getNum(member),
        hair: member.hair, hairStyle: member.hairStyle,
      };
    });
    onDone(team);
  };

  return (
    <div style={{ width: "100vw", height: "100vh",
      background: "linear-gradient(180deg, #020210 0%, #0a1040 100%)",
      display: "flex", flexDirection: "column",
      padding: "20px 24px", boxSizing: "border-box", overflow: "auto",
      fontFamily: "'Segoe UI', Arial, sans-serif", color: "#fff" }}>

      <div style={{ textAlign: "center", marginBottom: 12 }}>
        <div style={{ fontSize: 10, color: "rgba(255,255,255,0.3)", letterSpacing: 5, textTransform: "uppercase" }}>FC Kongehuset</div>
        <h2 style={{ fontSize: 24, fontWeight: 900, margin: "2px 0" }}>SÆT DIT HOLD</h2>
        <div style={{ width: 60, height: 2, background: "linear-gradient(90deg, transparent, #2563eb, transparent)", margin: "6px auto" }} />
        <div style={{ fontSize: 11, color: "rgba(255,255,255,0.35)", marginTop: 4 }}>
          Klik på to spillere for at bytte deres pladser
        </div>
      </div>

      <div style={{ display: "flex", gap: 20, flex: 1, minHeight: 0 }}>
        {/* Field with formation */}
        <div style={{ flex: 1, background: "linear-gradient(180deg, #176834, #1d7a3e, #25924a)", borderRadius: 12,
          position: "relative", border: "2px solid rgba(255,255,255,0.08)", minHeight: 340 }}>
          {/* Field markings */}
          <div style={{ position: "absolute", left: "10%", right: "10%", top: "8%", bottom: "4%",
            border: "1px solid rgba(255,255,255,0.12)", borderRadius: 2 }} />
          {/* Center circle */}
          <div style={{ position: "absolute", left: "50%", top: "50%", width: 60, height: 60,
            border: "1px solid rgba(255,255,255,0.1)", borderRadius: "50%", transform: "translate(-50%, -50%)" }} />
          {/* Penalty area */}
          <div style={{ position: "absolute", left: "25%", right: "25%", bottom: "4%", height: "18%",
            border: "1px solid rgba(255,255,255,0.1)", borderRadius: 2 }} />
          {/* Goal */}
          <div style={{ position: "absolute", left: "38%", right: "38%", bottom: "4%", height: "4%",
            border: "1.5px solid rgba(255,255,255,0.2)", borderTop: "none", borderRadius: "0 0 2px 2px" }} />

          {/* Player slots */}
          {FORMATION_SLOTS.map(slot => {
            const name = assignments[slot.id];
            const member = FAMILY_MEMBERS.find(f => f.name === name);
            const isSel = selected === slot.id;
            const teamCol = playerConfig ? playerConfig.primaryColor : "#2563eb";
            const secCol = playerConfig ? playerConfig.secondaryColor : "#ffffff";
            const isKeeper = slot.id === "gk";
            return (
              <div key={slot.id} onClick={() => handleSlotClick(slot.id)}
                style={{ position: "absolute", left: `${slot.x}%`, top: `${slot.y}%`, transform: isSel ? "translate(-50%, -50%) scale(1.15)" : "translate(-50%, -50%)",
                  cursor: "pointer", textAlign: "center", zIndex: isSel ? 10 : 1, transition: "transform 0.2s" }}>
                <div style={{ width: 42, height: 42, borderRadius: "50%",
                  background: isKeeper ? "linear-gradient(135deg, #22c55e, #16a34a)" : `linear-gradient(135deg, ${teamCol}, ${shadeColor(teamCol, -25)})`,
                  border: isSel ? "2.5px solid #facc15" : "2px solid rgba(255,255,255,0.2)",
                  boxShadow: isSel ? "0 0 20px rgba(250,204,21,0.5), 0 0 40px rgba(250,204,21,0.2)" : "0 2px 8px rgba(0,0,0,0.4)",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: 14, fontWeight: 800, color: isKeeper ? "#000" : secCol,
                  margin: "0 auto", transition: "all 0.2s" }}>
                  {member ? getNum(member) : "?"}
                </div>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#fff", marginTop: 3,
                  textShadow: "0 1px 4px rgba(0,0,0,0.8)" }}>{name}</div>
                <div style={{ fontSize: 8, color: "rgba(255,255,255,0.45)", textTransform: "uppercase", letterSpacing: 1 }}>{slot.label}</div>
              </div>
            );
          })}
        </div>

        {/* Right panel: roster */}
        <div style={{ flex: "0 0 220px", display: "flex", flexDirection: "column", gap: 6 }}>
          <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", letterSpacing: 2, textTransform: "uppercase", marginBottom: 4 }}>Spillertrup</div>
          {FAMILY_MEMBERS.map(member => {
            const slotId = Object.entries(assignments).find(([k, v]) => v === member.name)?.[0];
            const slot = FORMATION_SLOTS.find(s => s.id === slotId);
            const isSelectedPlayer = selected && assignments[selected] === member.name;
            return (
              <div key={member.name}
                style={{ display: "flex", alignItems: "center", gap: 10, padding: "7px 10px",
                  background: isSelectedPlayer ? "rgba(250,204,21,0.12)" : "rgba(255,255,255,0.03)",
                  borderRadius: 8, border: isSelectedPlayer ? "1px solid rgba(250,204,21,0.3)" : "1px solid rgba(255,255,255,0.04)",
                  transition: "all 0.2s" }}>
                <div style={{ width: 32, height: 32, borderRadius: "50%",
                  background: slotId === "gk" ? "linear-gradient(135deg, #22c55e, #16a34a)" :
                    `linear-gradient(135deg, ${playerConfig?.primaryColor || "#2563eb"}, ${shadeColor(playerConfig?.primaryColor || "#2563eb", -25)})`,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: 12, fontWeight: 700, color: slotId === "gk" ? "#000" : (playerConfig?.secondaryColor || "#ffffff"),
                  border: member.name === "Edgar" ? "1.5px solid #facc15" : "1px solid rgba(255,255,255,0.1)" }}>
                  {getNum(member)}
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 12, fontWeight: 700 }}>{member.name}</div>
                  <div style={{ fontSize: 9, color: "rgba(255,255,255,0.35)" }}>{slot?.label || "—"}</div>
                </div>
                {member.name === "Edgar" && <div style={{ fontSize: 9, color: "#facc15", fontWeight: 700 }}>★ KPT</div>}
              </div>
            );
          })}
          <div style={{ marginTop: 4, padding: "7px 10px", background: "rgba(255,255,255,0.02)", borderRadius: 8,
            border: "1px solid rgba(255,255,255,0.04)", display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 32, height: 32, borderRadius: "50%", background: "linear-gradient(135deg, #6b7280, #4b5563)",
              display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14 }}>👤</div>
            <div><div style={{ fontSize: 12, fontWeight: 700 }}>Ela</div><div style={{ fontSize: 9, color: "rgba(255,255,255,0.35)" }}>Træner</div></div>
          </div>
          <div style={{ padding: "7px 10px", background: "rgba(255,255,255,0.02)", borderRadius: 8,
            border: "1px solid rgba(255,255,255,0.04)", display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 32, height: 32, borderRadius: "50%", background: "linear-gradient(135deg, #9ca3af, #6b7280)",
              display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>🐱</div>
            <div><div style={{ fontSize: 12, fontWeight: 700 }}>Måvens</div><div style={{ fontSize: 9, color: "rgba(255,255,255,0.35)" }}>Maskot</div></div>
          </div>
        </div>
      </div>

      <div style={{ textAlign: "center", marginTop: 12 }}>
        <button onClick={buildTeam}
          style={{ padding: "12px 48px", background: "linear-gradient(135deg, #2563eb, #1d4ed8)",
            border: "none", borderRadius: 10, color: "#fff", fontSize: 16, fontWeight: 800,
            cursor: "pointer", letterSpacing: 2, boxShadow: "0 4px 30px rgba(37,99,235,0.35)" }}>
          START TURNERING ⚽
        </button>
      </div>
    </div>
  );
}

// ======================== MAIN ========================

function EdgarsFodboldudfordring() {
  const [screen, setScreen] = useState("title");
  const [mi, setMi] = useState(0);
  const [results, setResults] = useState([]);
  const [playerConfig, setPlayerConfig] = useState(null);
  const [teamConfig, setTeamConfig] = useState(null);
  const [difficulty, setDifficulty] = useState("medium");

  const handleStartWithDifficulty = useCallback((diffKey) => {
    setDifficulty(diffKey);
    GAME_DIFFICULTY = diffKey;
    OPPONENTS = buildOpponents(diffKey);
    setScreen("designPlayer");
  }, []);

  const handleDesignDone = useCallback((config) => {
    setPlayerConfig(config);
    setScreen("setTeam");
  }, []);

  const handleTeamDone = useCallback((team) => {
    setTeamConfig(team);
    // Update the global TEAM colors based on player design
    if (playerConfig) {
      TEAM.colors = [playerConfig.primaryColor, playerConfig.secondaryColor];
    }
    // Update PLAYERS based on team assignments
    for (let i = 0; i < team.length && i < PLAYERS.length; i++) {
      PLAYERS[i].name = team[i].name;
      PLAYERS[i].role = team[i].role;
      PLAYERS[i].num = team[i].name === "Edgar" && playerConfig ? playerConfig.jerseyNum : team[i].num;
      PLAYERS[i].hair = team[i].hair;
      PLAYERS[i].hairStyle = team[i].hairStyle;
    }
    setScreen("bracket");
  }, [playerConfig]);

  const handleMatchEnd = useCallback((won, ps, os) => {
    if (won) {
      setResults(p => { const n = [...p]; n[mi] = { won, playerScore: ps, opponentScore: os }; return n; });
      if (mi >= OPPONENTS.length - 1) setScreen("victory");
      else { setMi(p => p + 1); setScreen("bracket"); }
    } else setScreen("defeat");
  }, [mi]);

  const handleRestart = useCallback(() => {
    TEAM.colors = ["#2563eb", "#ffffff"];
    const origPlayers = [
      { name: "Edgar", role: "Kaptajn", num: 10, hair: "#b8943a", hairStyle: "curly" },
      { name: "Herbert", role: "Angriber", num: 7, hair: "#5c3317", hairStyle: "short" },
      { name: "Bernhard", role: "Midtbane", num: 8, hair: "#daa520", hairStyle: "straight" },
      { name: "Thomas", role: "Forsvar", num: 4, hair: "#5c3317", hairStyle: "short" },
      { name: "Benjamin", role: "Midtbane", num: 6, hair: "#5c3317", hairStyle: "short" },
      { name: "Sosha", role: "Angriber", num: 9, hair: "#5c3317", hairStyle: "long" },
      { name: "Joshua", role: "Målmand", num: 1, hair: "#5c3317", hairStyle: "short" },
    ];
    for (let i = 0; i < origPlayers.length; i++) Object.assign(PLAYERS[i], origPlayers[i]);
    OPPONENTS = buildOpponents("medium"); GAME_DIFFICULTY = "medium";
    setScreen("title"); setMi(0); setResults([]); setPlayerConfig(null); setTeamConfig(null); setDifficulty("medium");
  }, []);

  return (
    <div style={{ width: "100vw", height: "100vh", background: "#020208", overflow: "hidden" }}>
      {screen === "title" && <TitleScreen onStart={handleStartWithDifficulty} />}
      {screen === "designPlayer" && <DesignPlayerScreen onDone={handleDesignDone} />}
      {screen === "setTeam" && <SetTeamScreen playerConfig={playerConfig} onDone={handleTeamDone} />}
      {screen === "bracket" && <BracketScreen results={results} currentMatch={mi} onStartMatch={(i) => { setMi(i); setScreen("shootout"); }} />}
      {screen === "shootout" && <ShootoutGame key={`m-${mi}-${Date.now()}`} opponent={OPPONENTS[mi]} onMatchEnd={handleMatchEnd} difficultyKey={difficulty} />}
      {screen === "victory" && <VictoryScreen onRestart={handleRestart} />}
      {screen === "defeat" && <DefeatScreen opponentName={OPPONENTS[mi]?.name} onRetry={() => setScreen("shootout")} />}
    </div>
  );
}
        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(EdgarsFodboldudfordring));
    </script>
</body>
